name: vendor_app
description: OnMint Vendor App - Healthcare service providers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Shared packages
  auth_service:
    path: ../shared_packages/auth_service
  api_client:
    path: ../shared_packages/api_client
  location_service:
    path: ../shared_packages/location_service
  ui_components:
    path: ../shared_packages/ui_components
  
  # State management
  provider: ^6.0.5
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  
  # Network
  http: ^1.1.0
  connectivity_plus: ^5.0.1
  
  # UI
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  jitsi_meet_flutter_sdk: ^11.6.0
  webview_flutter: ^4.4.2
  
  # File handling - image_picker is more stable and v2 embedding compatible
  image_picker: ^1.2.2
  path_provider: ^2.1.1
  open_file: ^3.3.2
  mime: ^1.0.4
  url_launcher: ^6.3.2
  
  # Push Notifications
  firebase_core: ^4.11.0
  file_picker: ^11.0.2
  dotted_border: ^3.1.0
  firebase_messaging: ^16.4.0
  flutter_local_notifications: ^17.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter
  mockito: ^5.4.2
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/pathology/
    - assets/images/bloodbank/
    - assets/images/request_order/
    - assets/images/register_login/